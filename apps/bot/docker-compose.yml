services:
  bot:
    build:
      context: ../../
      dockerfile: apps/bot/Dockerfile
    container_name: freelance-hub-bot
    restart: unless-stopped
    env_file: ../../.env
    volumes:
      - bot-data:/app/apps/bot/data
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=10M

volumes:
  bot-data:
    name: freelance-hub-bot-data
